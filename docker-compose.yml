services:
  backend:
    build:
      context: ./backend
    container_name: ai-voice-agent-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-voice-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ai-voice-agent-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
